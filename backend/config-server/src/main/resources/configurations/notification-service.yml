server:
  port: 8085

spring:
  application:
    name: notification-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/notification_db}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.skbingegalaxy.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000

app:
  notification:
    from-email: ${EMAIL_FROM:noreply@skbingegalaxy.com}
    from-name: SK Binge Galaxy
    max-retries: ${NOTIFICATION_MAX_RETRIES:3}
    retry-interval-ms: ${NOTIFICATION_RETRY_INTERVAL_MS:300000}
  sms:
    provider: ${SMS_PROVIDER:disabled}
    api-key: ${SMS_API_KEY:}
  whatsapp:
    provider: ${WHATSAPP_PROVIDER:disabled}
    phone-id: ${WHATSAPP_PHONE_ID:}
    token: ${WHATSAPP_TOKEN:}

logging:
  level:
    com.skbingegalaxy.notification: WARN

eureka:
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:0.05}
    propagation:
      type: b3
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
