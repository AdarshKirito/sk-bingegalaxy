server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:auth_svc}
    password: ${SPRING_DATASOURCE_PASSWORD:auth_svc_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:8}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:0}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jakarta.persistence.query.timeout: ${JPA_QUERY_TIMEOUT_MS:10000}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      observation-enabled: true
    template:
      observation-enabled: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 900000  # 15 minutes
    refresh-expiration-ms: 604800000  # 7 days
  cookie:
    secure: ${COOKIE_SECURE:true}
    domain: ${COOKIE_DOMAIN:}
  admin:
    email: ${ADMIN_EMAIL:admin@skbingegalaxy.com}
    password: ${ADMIN_PASSWORD}
    name: ${ADMIN_NAME:System Administrator}
    phone: ${ADMIN_PHONE:9876543210}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  otp:
    expiration-minutes: 10
    length: 8
  reminders:
    enabled: ${CELEBRATION_REMINDERS_ENABLED:true}
    cron: ${CELEBRATION_REMINDER_CRON:0 0 9 * * *}
    zone: ${CELEBRATION_REMINDER_ZONE:Asia/Kolkata}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}

logging:
  level:
    com.skbingegalaxy.auth: WARN

eureka:
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
        probability: ${TRACING_SAMPLING:0.10}
    propagation:
      type: b3
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
