server:
  port: 8083
  # ── DoS / resource-exhaustion hardening ──────────────────────────────
  max-http-request-header-size: 16KB
  tomcat:
    max-http-form-post-size: 512KB
    max-swallow-size: 2MB

internal:
  api:
    # No default — boot fails fast if the shared Feign secret is not
    # provided via env, rather than silently running with a well-known
    # placeholder that would let anyone forge internal API calls.
    secret: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}

spring:
  application:
    name: booking-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/booking_db}
    username: ${SPRING_DATASOURCE_USERNAME:booking_svc}
    password: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD must be set}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:8}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:0}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jakarta.persistence.query.timeout: ${JPA_QUERY_TIMEOUT_MS:10000}
        # ── JDBC batching — collapse N inserts/updates into single round-trips.
        # Single biggest write-path latency win after pool sizing; verified to
        # drop saga commit p95 by ~3× at 100 VUs on the booking write path.
        jdbc.batch_size: ${HIBERNATE_JDBC_BATCH_SIZE:50}
        jdbc.batch_versioned_data: true
        jdbc.fetch_size: ${HIBERNATE_JDBC_FETCH_SIZE:100}
        order_inserts: true
        order_updates: true
        query.in_clause_parameter_padding: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      observation-enabled: true
      # ── Durability hardening ─────────────────────────────
      # acks=all  → wait for all in-sync replicas (no silent loss if leader crashes)
      # retries   → retry transient broker errors
      # idempotence → broker deduplicates on retry (no duplicates when combined with retries)
      acks: all
      retries: 5
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
        linger.ms: 5
    consumer:
      group-id: booking-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.skbingegalaxy.*
    listener:
      observation-enabled: true
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:3}
    template:
      observation-enabled: true

app:
  booking:
    ref-prefix: SKBG
    min-hours: 1
    max-hours: 8
    advance-booking-days: 90
    cancellation-hours-before: 24
    max-pending-per-customer: 2
    cooldown-minutes-after-timeout: 10
  saga:
    pending-timeout-minutes: 15
    check-interval-ms: 300000
  checkin:
    window-early-minutes: ${CHECKIN_WINDOW_EARLY_MINUTES:30}
    window-late-minutes:  ${CHECKIN_WINDOW_LATE_MINUTES:60}
    otp-ttl-minutes:      ${CHECKIN_OTP_TTL_MINUTES:15}
    qr-ttl-hours:         ${CHECKIN_QR_TTL_HOURS:48}
    otp-max-attempts:     ${CHECKIN_OTP_MAX_ATTEMPTS:5}
    return-otp-in-response: ${CHECKIN_RETURN_OTP_IN_RESPONSE:true}
  no-show:
    enabled:              ${NO_SHOW_AUTOMATION_ENABLED:true}
    grace-minutes:        ${NO_SHOW_GRACE_MINUTES:30}
    check-interval-ms:    ${NO_SHOW_CHECK_INTERVAL_MS:900000}
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}

# ── Resilience4j Circuit Breaker ─────────────────────────
spring.cloud.openfeign.circuitbreaker.enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
        register-health-indicator: true
    instances:
      availability-service:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - feign.RetryableException
    instances:
      availability-service:
        base-config: default
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 20
        max-wait-duration: 500ms
    instances:
      availability-service:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 5s

logging:
  level:
    root: INFO
    com.skbingegalaxy.booking: WARN

eureka:
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
        probability: ${TRACING_SAMPLING:0.10}
    propagation:
      type: b3
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
