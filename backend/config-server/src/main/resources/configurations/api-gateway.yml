server:
  port: 8080
  # ── DoS / resource-exhaustion hardening ──────────────────────────────
  max-http-request-header-size: 16KB

spring:
  # Cap in-memory buffering for the reactive gateway so a rogue upstream
  # cannot balloon Netty direct memory with a multi-MB body.
  codec:
    max-in-memory-size: 2MB
  application:
    name: api-gateway
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s
  security:
    jwt:
      secret: ${JWT_SECRET}
      # Must match app.jwt.issuer / app.jwt.audience in auth-service.
      issuer: ${JWT_ISSUER:skbingegalaxy-auth}
      audience: ${JWT_AUDIENCE:skbingegalaxy-web}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      default-filters: []
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: authServiceCB
                fallbackUri: forward:/fallback

        - id: site-content
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/site-content/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: authServiceCB
                fallbackUri: forward:/fallback

        - id: availability-service
          uri: lb://availability-service
          predicates:
            - Path=/api/v1/availability/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: availabilityServiceCB
                fallbackUri: forward:/fallback

        # SSE stream route — must come BEFORE the general booking route.
        # No circuit breaker and no response-timeout so the long-lived
        # text/event-stream connection is not killed at 30 s.
        - id: booking-service-sse
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/bookings/admin/events/stream
          metadata:
            response-timeout: -1
            connect-timeout: 5000
          filters:
            - StripPrefix=0

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/bookings/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: bookingServiceCB
                fallbackUri: forward:/fallback

        # Booking transfers also live in booking-service. This route carries
        # both surfaces of the 2-phase transfer flow:
        #   /api/v1/booking-transfers/by-token/** — recipient magic-link
        #     endpoints (public; the JWT filter allowlists exactly this
        #     prefix and the 256-bit accept token is the bearer).
        # Anything else under /api/v1/booking-transfers/ still requires a JWT.
        - id: booking-transfer-service
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/booking-transfers/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: bookingServiceCB
                fallbackUri: forward:/fallback

        # Loyalty v2 also lives in booking-service.
        - id: booking-service-loyalty-v2
          uri: lb://booking-service
          predicates:
            - Path=/api/v2/loyalty/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: bookingServiceCB
                fallbackUri: forward:/fallback

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: paymentServiceCB
                fallbackUri: forward:/fallback

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback

# Resilience4j circuit breaker defaults
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 80
    instances:
      authServiceCB:
        base-config: default
      availabilityServiceCB:
        base-config: default
      bookingServiceCB:
        base-config: default
      paymentServiceCB:
        base-config: default
        wait-duration-in-open-state: 60s
      notificationServiceCB:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 30s

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO

eureka:
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:0.05}
    propagation:
      type: b3
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
