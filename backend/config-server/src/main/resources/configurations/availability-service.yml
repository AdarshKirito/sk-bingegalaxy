server:
  port: 8082
  # ── DoS / resource-exhaustion hardening ──────────────────────────────
  max-http-request-header-size: 16KB
  tomcat:
    max-http-form-post-size: 256KB
    max-swallow-size: 2MB
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:5000}
    keep-alive-timeout: ${TOMCAT_KEEP_ALIVE_TIMEOUT:20000}

internal:
  api:
    secret: ${INTERNAL_API_SECRET}

spring:
  application:
    name: availability-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/availability_db}
    username: ${SPRING_DATASOURCE_USERNAME:availability_svc}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:8}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:5000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:3000}
      leak-detection-threshold: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD:60000}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:0}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jakarta.persistence.query.timeout: ${JPA_QUERY_TIMEOUT_MS:10000}
        jdbc.time_zone: UTC
        # ── JDBC batching — collapse N inserts/updates into single round-trips.
        jdbc.batch_size: ${HIBERNATE_JDBC_BATCH_SIZE:50}
        jdbc.batch_versioned_data: true
        jdbc.fetch_size: ${HIBERNATE_JDBC_FETCH_SIZE:100}
        order_inserts: true
        order_updates: true
        query.in_clause_parameter_padding: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: availability-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.skbingegalaxy.*
    listener:
      observation-enabled: true
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:3}

app:
  theater:
    opening-hour: ${THEATER_OPENING_HOUR:10}
    closing-hour: ${THEATER_CLOSING_HOUR:23}
    slot-duration-minutes: 60
    max-concurrent-bookings: 1

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}

logging:
  level:
    root: INFO
    com.skbingegalaxy.availability: WARN

# ── Resilience4j Circuit Breaker ─────────────────────────
spring.cloud.openfeign.circuitbreaker.enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
        register-health-indicator: true
    instances:
      booking-service:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - feign.RetryableException
    instances:
      booking-service:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 5s

eureka:
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:0.10}
    propagation:
      type: b3
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
