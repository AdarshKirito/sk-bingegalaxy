server:
  shutdown: graceful

spring:
  application:
    name: availability-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  # ── Fallback: critical settings if Config Server is unreachable ──
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/availability_db}
    username: ${SPRING_DATASOURCE_USERNAME:availability_svc}
    password: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD must be set}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ── Feign: tight timeouts + circuit-breaker integration ──
# availability-service is in the booking hot path; any stall here directly
# delays user-facing slot lookups. Short timeouts + a circuit breaker keep the
# failure isolated to individual requests.
spring.cloud.openfeign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000
        logger-level: basic
  circuitbreaker:
    enabled: true

resilience4j.circuitbreaker:
  configs:
    default:
      sliding-window-type: COUNT_BASED
      sliding-window-size: 20
      minimum-number-of-calls: 10
      failure-rate-threshold: 50
      slow-call-duration-threshold: 4000ms
      slow-call-rate-threshold: 60
      wait-duration-in-open-state: 30s
      permitted-number-of-calls-in-half-open-state: 3
      automatic-transition-from-open-to-half-open-enabled: true
  instances:
    BookingBingeClient:
      base-config: default
resilience4j.timelimiter:
  configs:
    default:
      timeout-duration: 6s
      cancel-running-future: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  instance:
    prefer-ip-address: true
