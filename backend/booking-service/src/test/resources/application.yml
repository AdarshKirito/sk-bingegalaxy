spring:
  application:
    name: booking-service
  cloud:
    config:
      enabled: false
  config:
    import: "optional:configserver:"
  datasource:
    url: jdbc:h2:mem:booking_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:9999
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

eureka:
  client:
    enabled: false

app:
  booking:
    ref-prefix: TEST
