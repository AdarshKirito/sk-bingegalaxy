server:
  shutdown: graceful

spring:
  application:
    name: booking-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  # ── Fallback: critical settings if Config Server is unreachable ──
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/booking_db}
    username: ${SPRING_DATASOURCE_USERNAME:booking_svc}
    password: ${SPRING_DATASOURCE_PASSWORD:booking_svc_dev}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      enable-auto-commit: false
      max-poll-records: 20
      isolation-level: read_committed
      auto-offset-reset: earliest
    listener:
      ack-mode: record
      missing-topics-fatal: false
      concurrency: 2
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

spring.cloud.openfeign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000
        logger-level: basic
  circuitbreaker:
    enabled: true

resilience4j.circuitbreaker:
  configs:
    default:
      sliding-window-type: COUNT_BASED
      sliding-window-size: 20
      minimum-number-of-calls: 10
      failure-rate-threshold: 50
      slow-call-duration-threshold: 4000ms
      slow-call-rate-threshold: 60
      wait-duration-in-open-state: 30s
      permitted-number-of-calls-in-half-open-state: 3
      automatic-transition-from-open-to-half-open-enabled: true
resilience4j.timelimiter:
  configs:
    default:
      timeout-duration: 6s
      cancel-running-future: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  instance:
    prefer-ip-address: true
