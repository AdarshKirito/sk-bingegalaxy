<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #16213e; border-radius: 8px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #e94560, #533483); padding: 24px; text-align: center; }
        .header h1 { color: #fff; margin: 0; font-size: 24px; }
        .body { padding: 32px 24px; }
        .body h2 { color: #e94560; }
        .otp-box { background: #0f3460; border-radius: 6px; padding: 20px; margin: 16px 0; text-align: center; }
        .otp-code { font-size: 32px; letter-spacing: 8px; color: #e94560; font-weight: 700; }
        .footer { background: #0f3460; padding: 16px 24px; text-align: center; font-size: 12px; color: #a0a0a0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>SK Binge Galaxy</h1></div>
    <div class="body">
        <h2>Password Reset</h2>
        <p>Hi <span th:text="${name}">User</span>,</p>
        <p>We received a request to reset your password. Use the OTP below:</p>
        <div class="otp-box">
            <div class="otp-code" th:text="${otp}">123456</div>
        </div>
        <p>This code expires in <strong th:text="${expiryMinutes}">10</strong> minutes.</p>
        <p>If you did not request a password reset, please ignore this email — your account is safe.</p>
    </div>
    <div class="footer">&copy; 2025 SK Binge Galaxy. All rights reserved.</div>
</div>
</body>
</html>
