services:
  # ── Databases ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: skbg-postgres
    environment:
      POSTGRES_USER: skbg_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skbg_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skbg_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: skbg-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: skbg_admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-skbg_secret}
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ──────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: skbg-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: skbg-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Tracing ────────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:latest
    ports:
      - "9411:9411"

  # ── Spring Cloud Infrastructure ────────────────────────────
  discovery-server:
    build: ./backend/discovery-server
    container_name: skbg-discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://eureka:eureka_secret@localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  config-server:
    build: ./backend/config-server
    container_name: skbg-config
    depends_on:
      discovery-server:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-gateway:
    build: ./backend/api-gateway
    container_name: skbg-gateway
    depends_on:
      config-server:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888

  # ── Application Services ───────────────────────────────────
  auth-service:
    build: ./backend/auth-service
    container_name: skbg-auth
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: skbg_admin
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-skbg_secret}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  availability-service:
    build: ./backend/availability-service
    container_name: skbg-availability
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/availability_db
      SPRING_DATASOURCE_USERNAME: skbg_admin
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-skbg_secret}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888

  booking-service:
    build: ./backend/booking-service
    container_name: skbg-booking
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/booking_db
      SPRING_DATASOURCE_USERNAME: skbg_admin
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-skbg_secret}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  payment-service:
    build: ./backend/payment-service
    container_name: skbg-payment
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: skbg_admin
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-skbg_secret}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  notification-service:
    build: ./backend/notification-service
    container_name: skbg-notification
    depends_on:
      mongodb:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://skbg_admin:${MONGO_PASSWORD:-skbg_secret}@mongodb:27017/notification_db?authSource=admin
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: skbg-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres-data:
  mongo-data:
