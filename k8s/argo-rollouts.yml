# ── Canary Deployments: Argo Rollouts ────────────────────────────────────────
# Prerequisites:
#   kubectl create namespace argo-rollouts
#   kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
#
# Converts the five application Deployments from services.yml into Argo Rollouts
# with a canary strategy. The existing services.yml Deployments should be replaced
# by these Rollouts; services.yml Service objects remain unchanged.
#
# Canary strategy:
#   5% → pause 5m (bake) → analysis → 25% → pause 5m → analysis → 50% → pause 5m → 100%
#   If any AnalysisRun fails, automatic rollback occurs.
# ─────────────────────────────────────────────────────────────────────────────

# ── AnalysisTemplate — shared success-rate check via Prometheus ──────────────
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: sk-binge-galaxy
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 60s
      count: 3
      successCondition: result[0] >= 0.95
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_server_requests_seconds_count{namespace="sk-binge-galaxy",app="{{args.service-name}}",status=~"2.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{namespace="sk-binge-galaxy",app="{{args.service-name}}"}[5m]))
---
# ── AnalysisTemplate — pod restart check ─────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: pod-restart-check
  namespace: sk-binge-galaxy
spec:
  args:
    - name: service-name
  metrics:
    - name: pod-restarts
      interval: 60s
      count: 3
      successCondition: result[0] == 0
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(increase(kube_pod_container_status_restarts_total{namespace="sk-binge-galaxy",container="{{args.service-name}}"}[5m]))
---
# ── auth-service Rollout ─────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: auth-service
  namespace: sk-binge-galaxy
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: auth-service
  strategy:
    canary:
      canaryService: auth-service-canary
      stableService: auth-service
      trafficRouting:
        nginx:
          stableIngress: auth-service
      steps:
        - setWeight: 5
        - pause: { duration: 5m }
        - analysis:
            templates:
              - templateName: success-rate
              - templateName: pod-restart-check
            args:
              - name: service-name
                value: auth-service
        - setWeight: 25
        - pause: { duration: 5m }
        - analysis:
            templates:
              - templateName: success-rate
            args:
              - name: service-name
                value: auth-service
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: spring-cloud-kubernetes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: auth-service
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-service
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          image: skbingegalaxy/auth-service:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/auth_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-db-creds
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-creds
                  key: password
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# Canary service for traffic splitting
apiVersion: v1
kind: Service
metadata:
  name: auth-service-canary
  namespace: sk-binge-galaxy
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
---
