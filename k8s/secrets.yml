# Sealed/External Secrets pattern for production.
# Option 1: Use Sealed Secrets (bitnami/sealed-secrets)
# Option 2: Use External Secrets Operator with AWS Secrets Manager / Vault / GCP Secret Manager
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Then configure your secret backend (e.g., Vault, AWS SM, GCP SM) and create a ClusterSecretStore.
# ============================================================

# ── ClusterSecretStore (configure for your provider) ──────────
# Uncomment and configure ONE of the following:

# --- HashiCorp Vault ---
# apiVersion: external-secrets.io/v1beta1
# kind: ClusterSecretStore
# metadata:
#   name: vault-backend
# spec:
#   provider:
#     vault:
#       server: "https://vault.example.com"
#       path: "secret"
#       version: "v2"
#       auth:
#         kubernetes:
#           mountPath: "kubernetes"
#           role: "sk-binge-galaxy"
#           serviceAccountRef:
#             name: "vault-auth"
#             namespace: "sk-binge-galaxy"

# --- AWS Secrets Manager ---
# apiVersion: external-secrets.io/v1beta1
# kind: ClusterSecretStore
# metadata:
#   name: aws-secretsmanager
# spec:
#   provider:
#     aws:
#       service: SecretsManager
#       region: ap-south-1
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: "external-secrets-sa"
#             namespace: "external-secrets"
---
# ── ExternalSecret: Database Credentials ──────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secrets
  namespace: sk-binge-galaxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend  # Change to your ClusterSecretStore name
    kind: ClusterSecretStore
  target:
    name: db-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: sk-binge-galaxy/db
        property: postgres_user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: sk-binge-galaxy/db
        property: postgres_password
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: sk-binge-galaxy/db
        property: postgres_user
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: sk-binge-galaxy/db
        property: postgres_password
    - secretKey: MONGO_USER
      remoteRef:
        key: sk-binge-galaxy/db
        property: mongo_user
    - secretKey: MONGO_PASSWORD
      remoteRef:
        key: sk-binge-galaxy/db
        property: mongo_password
    - secretKey: MONGODB_URI
      remoteRef:
        key: sk-binge-galaxy/db
        property: mongodb_uri
---
# ── ExternalSecret: Application Secrets ───────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: sk-binge-galaxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend  # Change to your ClusterSecretStore name
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: sk-binge-galaxy/jwt
        property: secret
    - secretKey: RAZORPAY_KEY_ID
      remoteRef:
        key: sk-binge-galaxy/razorpay
        property: key_id
    - secretKey: RAZORPAY_KEY_SECRET
      remoteRef:
        key: sk-binge-galaxy/razorpay
        property: key_secret
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: sk-binge-galaxy/oauth
        property: google_client_id
    - secretKey: EUREKA_PASSWORD
      remoteRef:
        key: sk-binge-galaxy/infra
        property: eureka_password
    - secretKey: CONFIG_SERVER_PASSWORD
      remoteRef:
        key: sk-binge-galaxy/infra
        property: config_server_password
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: sk-binge-galaxy/admin
        property: password
---
# ══════════════════════════════════════════════════════════════
# Local/Dev fallback — DO NOT use in production.
# Create manually via:
#   kubectl create secret generic db-secrets \
#     --from-env-file=.env -n sk-binge-galaxy
# ══════════════════════════════════════════════════════════════
# apiVersion: v1
# kind: Secret
# metadata:
#   name: db-secrets
#   namespace: sk-binge-galaxy
# type: Opaque
# stringData:
