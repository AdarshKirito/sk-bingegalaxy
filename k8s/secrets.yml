#   POSTGRES_PASSWORD: "CHANGE_ME"
#   MONGO_USER: "skbg_admin"
#   MONGO_PASSWORD: "CHANGE_ME"
#   SPRING_DATASOURCE_USERNAME: "skbg_admin"
#   SPRING_DATASOURCE_PASSWORD: "CHANGE_ME"
#   JWT_SECRET: "CHANGE_ME"
#   RAZORPAY_KEY_ID: "CHANGE_ME"
#   RAZORPAY_KEY_SECRET: "CHANGE_ME"
#   MONGODB_URI: "mongodb://skbg_admin:CHANGE_ME@mongodb:27017/notification_db?authSource=admin"
