apiVersion: v1
kind: Namespace
metadata:
  name: sk-binge-galaxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: sk-binge-galaxy
data:
  SPRING_PROFILES_ACTIVE: "kubernetes"
  EUREKA_SERVER: "http://discovery-server:8761/eureka/"
  CONFIG_SERVER: "http://config-server:8888"
  KAFKA_BOOTSTRAP: "kafka:9092"
  POSTGRES_HOST: "postgres"
  MONGO_HOST: "mongodb"
---
# db-secrets managed by ExternalSecret or sealed-secrets in production.
# For local dev, create manually: kubectl create secret generic db-secrets \
#   --from-literal=POSTGRES_USER=skbg_admin \
#   --from-literal=POSTGRES_PASSWORD=<generated> \
#   --from-literal=MONGO_USER=skbg_admin \
#   --from-literal=MONGO_PASSWORD=<generated> \
#   -n sk-binge-galaxy
