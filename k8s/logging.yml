# ── Centralized Logging: Grafana Loki + Promtail ─────────────────────────────
# Loki is a lightweight log aggregation system designed for Kubernetes.
# Unlike Elasticsearch, it indexes only labels (service, namespace, level)
# not full text — making it cheaper to run and simpler to operate.
# It plugs directly into the existing Grafana deployment in monitoring.yml.
#
# Architecture:
#   Container stdout → Promtail DaemonSet → Loki → Grafana (LogQL queries)
#
# Prerequisites:
#   - Grafana already deployed (monitoring.yml)
#   - All services output structured JSON (logback-spring.xml with LogstashEncoder)
#
# Production notes:
#   - For HA, deploy Loki in microservices mode (read/write/backend) with
#     object storage (S3/GCS) instead of filesystem.
#   - Use Helm chart: helm install loki grafana/loki --values ...
# ─────────────────────────────────────────────────────────────────────────────

# ── Loki — log storage and query engine ──────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: sk-binge-galaxy
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache

    limits_config:
      retention_period: 336h          # 14 days hot retention
      max_query_lookback: 336h
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      per_stream_rate_limit: 3MB
      per_stream_rate_limit_burst: 15MB
      max_entries_limit_per_query: 5000
      max_query_series: 500

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      delete_request_store: filesystem

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    analytics:
      reporting_enabled: false
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: sk-binge-galaxy
  labels:
    app: loki
spec:
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: loki
          image: grafana/loki:3.1.0
          args:
            - -config.file=/etc/loki/loki.yaml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3100
              name: http
            - containerPort: 9096
              name: grpc
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: loki-data
              mountPath: /loki
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: config
          configMap:
            name: loki-config
  volumeClaimTemplates:
    - metadata:
        name: loki-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: __STORAGE_CLASS_NAME__
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: sk-binge-galaxy
  labels:
    app: loki
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
      name: http
    - port: 9096
      targetPort: 9096
      name: grpc
---
# ── Promtail DaemonSet — log collector on every node ─────────────────────────
# Tails container logs, enriches with K8s labels, ships to Loki.
# For structured JSON logs (LogstashEncoder), Promtail uses the pipeline
# stage 'json' to extract level, service, traceId, userId, bingeId as labels.
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: sk-binge-galaxy
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0
      log_level: warn

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push
        tenant_id: ""
        batchwait: 1s
        batchsize: 1048576

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - sk-binge-galaxy
        relabel_configs:
          # Only scrape pods with an app label matching our services
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: (auth-service|availability-service|booking-service|payment-service|notification-service|api-gateway|config-server|discovery-server)
            action: keep
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
        pipeline_stages:
          # Parse CRI log format
          - cri: {}
          # Parse the structured JSON from LogstashEncoder
          - json:
              expressions:
                level: level
                logger: logger_name
                trace_id: traceId
                span_id: spanId
                user_id: userId
                binge_id: bingeId
                service: service
                message: message
          # Promote fields to Loki labels for efficient querying
          - labels:
              level:
              service:
              trace_id:
              user_id:
              binge_id:
          # Drop debug/trace logs to reduce volume in production
          - match:
              selector: '{level=~"DEBUG|TRACE"}'
              action: drop
              drop_counter_reason: debug_logs
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: sk-binge-galaxy
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        - operator: Exists
      securityContext:
        runAsUser: 0
      containers:
        - name: promtail
          image: grafana/promtail:3.1.0
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - containerPort: 3101
              name: http-metrics
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: run
              mountPath: /run/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3101
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3101
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: run
          hostPath:
            path: /run/promtail
        - name: varlog
          hostPath:
            path: /var/log
        - name: pods
          hostPath:
            path: /var/log/pods
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: sk-binge-galaxy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: sk-binge-galaxy
