# ── Secrets Management: External Secrets Operator + HashiCorp Vault ───────────
# Prerequisites:
#   1. Install External Secrets Operator:
#      helm repo add external-secrets https://charts.external-secrets.io
#      helm install external-secrets external-secrets/external-secrets \
#        -n external-secrets --create-namespace
#   2. Deploy HashiCorp Vault (dev: helm install vault hashicorp/vault)
#      or configure AWS Secrets Manager / GCP Secret Manager / Azure Key Vault
#   3. Populate secrets in Vault at:
#        secret/data/sk-binge-galaxy/app-secrets
#        secret/data/sk-binge-galaxy/mongo-secrets
#        secret/data/sk-binge-galaxy/notification-secrets
#        secret/data/sk-binge-galaxy/postgres-admin-creds
#        + database/creds/{auth-svc,availability-svc,booking-svc,payment-svc}
#
# ─────────────────────────────────────────────────────────────────────────────

# ── ClusterSecretStore — connects to Vault ───────────────────────────────────
# Uses Kubernetes auth method so ESO pods exchange their SA token for a Vault token.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "sk-binge-galaxy"
          serviceAccountRef:
            name: vault-auth
            namespace: sk-binge-galaxy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: sk-binge-galaxy
---
# ── ExternalSecret: postgres-admin-creds ─────────────────────────────────────
# Admin-level PostgreSQL credentials for backup/restore CronJobs and CloudNativePG.
# Vault path: secret/data/sk-binge-galaxy/postgres-admin-creds
# Produces both POSTGRES_USER/POSTGRES_PASSWORD (Docker Compose / standalone)
# and username/password (CloudNativePG expects these keys for bootstrap.initdb.secret).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-admin-creds
  namespace: sk-binge-galaxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: postgres-admin-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: sk-binge-galaxy/postgres-admin-creds
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: sk-binge-galaxy/postgres-admin-creds
        property: POSTGRES_PASSWORD
    # CloudNativePG bootstrap expects 'username' and 'password' keys
    - secretKey: username
      remoteRef:
        key: sk-binge-galaxy/postgres-admin-creds
        property: POSTGRES_USER
    - secretKey: password
      remoteRef:
        key: sk-binge-galaxy/postgres-admin-creds
        property: POSTGRES_PASSWORD
---
# ── ExternalSecret: app-secrets ──────────────────────────────────────────────
# Vault path: secret/data/sk-binge-galaxy/app-secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
