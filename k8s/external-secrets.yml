# ═══════════════════════════════════════════════════════════════════════════════
# STATIC SECRETS (Vault KV v2)
# ═══════════════════════════════════════════════════════════════════════════════

# ── app-secrets (JWT, Eureka, Razorpay, etc.) ────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: sk-binge-galaxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: sk-binge-galaxy/app-secrets
        property: JWT_SECRET
    - secretKey: EUREKA_PASSWORD
      remoteRef:
        key: sk-binge-galaxy/app-secrets
        property: EUREKA_PASSWORD
    - secretKey: CONFIG_SERVER_PASSWORD
      remoteRef:
        key: sk-binge-galaxy/app-secrets
        property: CONFIG_SERVER_PASSWORD
    - secretKey: INTERNAL_API_SECRET
      remoteRef:
        key: sk-binge-galaxy/app-secrets
        property: INTERNAL_API_SECRET
    - secretKey: RAZORPAY_KEY_ID
      remoteRef:
        key: sk-binge-galaxy/app-secrets
        property: RAZORPAY_KEY_ID
    - secretKey: RAZORPAY_KEY_SECRET
      remoteRef:
        key: sk-binge-galaxy/app-secrets
        property: RAZORPAY_KEY_SECRET
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: sk-binge-galaxy/app-secrets
        property: GOOGLE_CLIENT_ID
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: sk-binge-galaxy/app-secrets
        property: REDIS_PASSWORD
---
