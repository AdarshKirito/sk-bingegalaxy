# ── Secrets Management: External Secrets Operator + HashiCorp Vault ───────────
#
# Architecture — two secret stores:
#   1. vault-kv       — KV v2 for static secrets (JWT, API keys, Razorpay, email)
#   2. vault-database — Database secrets engine for short-lived PostgreSQL creds
#
# Dynamic DB credentials flow:
#   ESO reads database/creds/<role> → Vault generates a short-lived PostgreSQL
#   user (TTL 1 h, max 24 h) → ESO writes the K8s Secret → Reloader triggers
#   a rolling restart so the new pod picks up fresh creds.
#
# Prerequisites:
#   1. Install ESO:
#        helm repo add external-secrets https://charts.external-secrets.io
#        helm install external-secrets external-secrets/external-secrets \
#          -n external-secrets --create-namespace
#
#   2. Install Reloader (triggers restarts on Secret changes):
#        helm repo add stakater https://stakater.github.io/stakater-charts
#        helm install reloader stakater/reloader -n sk-binge-galaxy
#
#   3. Deploy Vault:
#        helm install vault hashicorp/vault -n vault --create-namespace
#
#   4. Enable Kubernetes auth:
#        vault auth enable kubernetes
#        vault write auth/kubernetes/config \
#          kubernetes_host="https://$KUBERNETES_PORT_443_TCP_ADDR:443"
#        vault write auth/kubernetes/role/sk-binge-galaxy \
#          bound_service_account_names=vault-auth \
#          bound_service_account_namespaces=sk-binge-galaxy \
#          policies=sk-binge-galaxy-kv,sk-binge-galaxy-db \
#          ttl=1h
#
#   5. Populate KV secrets:
#        vault secrets enable -path=secret kv-v2
#        vault kv put secret/sk-binge-galaxy/app-secrets \
#          JWT_SECRET=... EUREKA_PASSWORD=... CONFIG_SERVER_PASSWORD=... \
#          INTERNAL_API_SECRET=... RAZORPAY_KEY_ID=... RAZORPAY_KEY_SECRET=... \
#          GOOGLE_CLIENT_ID=... REDIS_PASSWORD=...
#        vault kv put secret/sk-binge-galaxy/notification-secrets \
#          EMAIL_HOST=... EMAIL_PORT=... EMAIL_USER=... EMAIL_PASS=... \
#          TWILIO_ACCOUNT_SID=... TWILIO_AUTH_TOKEN=...
#        vault kv put secret/sk-binge-galaxy/mongo-secrets \
#          MONGO_INITDB_ROOT_USERNAME=... MONGO_INITDB_ROOT_PASSWORD=...
#        vault kv put secret/sk-binge-galaxy/postgres-admin-creds \
#          POSTGRES_USER=... POSTGRES_PASSWORD=...
#
#   6. Configure Database secrets engine:
#        vault secrets enable database
#
#        vault write database/config/postgres \
#          plugin_name=postgresql-database-plugin \
#          allowed_roles="auth-svc,availability-svc,booking-svc,payment-svc" \
#          connection_url="postgresql://{{username}}:{{password}}@postgres.sk-binge-galaxy.svc:5432/postgres?sslmode=require" \
#          username="vault_admin" \
#          password="<vault-admin-pg-password>"
#
#        # Per-service roles (scoped to each service's database):
#        for role in auth-svc:auth_db availability-svc:availability_db \
#                    booking-svc:booking_db payment-svc:payment_db; do
#          name=${role%%:*}; db=${role##*:}
#          vault write database/roles/$name \
#            db_name=postgres \
#            creation_statements="
#              CREATE ROLE \"{{name}}\" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}';
#              GRANT CONNECT ON DATABASE $db TO \"{{name}}\";
#              GRANT USAGE ON SCHEMA public TO \"{{name}}\";
#              GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO \"{{name}}\";
#              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO \"{{name}}\";" \
#            revocation_statements="
#              REVOKE ALL PRIVILEGES ON ALL TABLES IN SCHEMA public FROM \"{{name}}\";
#              REVOKE ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public FROM \"{{name}}\";
#              REVOKE CONNECT ON DATABASE $db FROM \"{{name}}\";
#              DROP ROLE IF EXISTS \"{{name}}\";" \
#            default_ttl=1h \
#            max_ttl=24h
#        done
#
#   7. Vault policies:
#        # sk-binge-galaxy-kv.hcl
#        path "secret/data/sk-binge-galaxy/*" { capabilities = ["read"] }
#        # sk-binge-galaxy-db.hcl
#        path "database/creds/*" { capabilities = ["read"] }
#
# ─────────────────────────────────────────────────────────────────────────────

# ── ServiceAccount for Vault Kubernetes auth ─────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: sk-binge-galaxy
---
# ── ClusterSecretStore: vault-kv (KV v2 — static secrets) ───────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-kv
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "sk-binge-galaxy"
          serviceAccountRef:
            name: vault-auth
            namespace: sk-binge-galaxy
---
# ── ClusterSecretStore: vault-database (dynamic DB creds) ────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-database
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "database"
      version: "v1"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "sk-binge-galaxy"
          serviceAccountRef:
            name: vault-auth
            namespace: sk-binge-galaxy
---
# ═══════════════════════════════════════════════════════════════════════════════
# DYNAMIC DATABASE CREDENTIALS (Vault Database Secrets Engine)
# Each ExternalSecret reads database/creds/<role>, causing Vault to mint
# a short-lived PostgreSQL role (1 h TTL). ESO refreshes at 30 m (< TTL)
# so the K8s Secret always has valid credentials. Reloader annotations on
# Deployments trigger rolling restarts when the Secret changes.
# ═══════════════════════════════════════════════════════════════════════════════

# ── auth-service DB credentials ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-db-creds
  namespace: sk-binge-galaxy
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: vault-database
    kind: ClusterSecretStore
  target:
    name: auth-db-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: creds/auth-svc
        property: username
    - secretKey: password
      remoteRef:
        key: creds/auth-svc
        property: password
---
# ── availability-service DB credentials ──────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: availability-db-creds
  namespace: sk-binge-galaxy
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: vault-database
    kind: ClusterSecretStore
  target:
    name: availability-db-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: creds/availability-svc
        property: username
    - secretKey: password
      remoteRef:
        key: creds/availability-svc
        property: password
---
