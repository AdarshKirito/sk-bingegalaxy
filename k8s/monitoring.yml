# Prometheus ServiceMonitor for auto-discovery of Spring Boot actuator endpoints.
# Requires: prometheus-operator (kube-prometheus-stack) installed in the cluster.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: spring-boot-services
  namespace: sk-binge-galaxy
  labels:
    release: prometheus  # must match Prometheus Operator's serviceMonitorSelector
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - auth-service
          - availability-service
          - booking-service
          - payment-service
          - notification-service
          - api-gateway
  namespaceSelector:
    matchNames:
      - sk-binge-galaxy
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: sk-binge-galaxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zipkin
  template:
    metadata:
      labels:
        app: zipkin
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: zipkin
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          image: openzipkin/zipkin:3.5.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9411
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: sk-binge-galaxy
spec:
  selector:
    app: zipkin
  ports:
    - port: 9411
      targetPort: 9411
      name: http
---
# Grafana — dashboarding for Prometheus metrics
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: sk-binge-galaxy
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-operated.sk-binge-galaxy.svc.cluster.local:9090
        isDefault: true
        editable: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sk-binge-galaxy
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:11.1.4
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GRAFANA_ADMIN_USER
                  optional: true
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GRAFANA_ADMIN_PASSWORD
                  optional: true
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data-pvc
  namespace: sk-binge-galaxy
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: __STORAGE_CLASS_NAME__
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sk-binge-galaxy
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---
# Prometheus alerting rules for critical production conditions
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sk-binge-galaxy-alerts
  namespace: sk-binge-galaxy
  labels:
    release: prometheus
spec:
  groups:
    - name: gateway-errors
      rules:
        - alert: HighGateway5xxRate
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{namespace="sk-binge-galaxy", app="api-gateway", status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{namespace="sk-binge-galaxy", app="api-gateway"}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "API Gateway 5xx error rate above 5%"
            description: "{{ $value | humanizePercentage }} of gateway requests are returning 5xx errors."
    - name: pod-health
      rules:
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="sk-binge-galaxy"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "{{ $labels.pod }} in {{ $labels.namespace }} restarted {{ $value }} times in 15 min."
        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="sk-binge-galaxy", condition="true"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} not ready for 10 min"
    - name: hpa-saturation
      rules:
        - alert: HPAAtMaxReplicas
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace="sk-binge-galaxy"}
            ==
            kube_horizontalpodautoscaler_spec_max_replicas{namespace="sk-binge-galaxy"}
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "HPA {{ $labels.horizontalpodautoscaler }} at max replicas for 15 min"
            description: "Cannot scale further — consider raising maxReplicas or optimizing the service."
    - name: database-health
      rules:
        - alert: HikariPoolExhausted
          expr: |
            hikaricp_connections_active{namespace="sk-binge-galaxy"}
            >=
            hikaricp_connections_max{namespace="sk-binge-galaxy"} * 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.app }} HikariCP pool >90% utilised"
            description: "Active: {{ $value }}. Consider increasing pool size or investigating slow queries."
    - name: kafka-health
      rules:
        - alert: KafkaConsumerLag
          expr: |
            kafka_consumer_lag_sum{namespace="sk-binge-galaxy"} > 1000
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Kafka consumer group {{ $labels.group }} lag exceeds 1000"
    - name: circuit-breaker
      rules:
        - alert: CircuitBreakerOpen
          expr: |
            resilience4j_circuitbreaker_state{namespace="sk-binge-galaxy", state="open"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Circuit breaker {{ $labels.name }} is OPEN on {{ $labels.app }}"
            description: "Downstream service may be unavailable. Check logs and dependencies."
