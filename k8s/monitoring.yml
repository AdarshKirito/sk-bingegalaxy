# Prometheus ServiceMonitor for auto-discovery of Spring Boot actuator endpoints.
# Requires: prometheus-operator (kube-prometheus-stack) installed in the cluster.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: spring-boot-services
  namespace: sk-binge-galaxy
  labels:
    release: prometheus  # must match Prometheus Operator's serviceMonitorSelector
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - auth-service
          - availability-service
          - booking-service
          - payment-service
          - notification-service
          - api-gateway
  namespaceSelector:
    matchNames:
      - sk-binge-galaxy
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: sk-binge-galaxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zipkin
  template:
    metadata:
      labels:
        app: zipkin
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: zipkin
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          image: openzipkin/zipkin:3.5.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9411
              name: http
          env:
            # Cap in-memory span count. At 233 req/s production throughput each
            # request generates ≈2-4 spans. 500 000 spans ≈ 15-30 min of data —
            # enough for incident triage. Without a cap the heap grows until OOM.
            - name: MEM_MAX_SPANS
              value: "500000"
            - name: STORAGE_TYPE
              value: "mem"
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx384m -XX:+ExitOnOutOfMemoryError"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: sk-binge-galaxy
spec:
  selector:
    app: zipkin
  ports:
    - port: 9411
      targetPort: 9411
      name: http
---
# Grafana — dashboarding for Prometheus metrics
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: sk-binge-galaxy
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-operated.sk-binge-galaxy.svc.cluster.local:9090
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: false
        jsonData:
          derivedFields:
            - datasourceUid: zipkin
              matcherRegex: '"traceId":"(\w+)"'
              name: TraceID
              url: '$${__value.raw}'
          maxLines: 1000
      - name: Zipkin
        type: zipkin
        uid: zipkin
        access: proxy
        url: http://zipkin:9411
        editable: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sk-binge-galaxy
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:11.1.4
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GRAFANA_ADMIN_USER
                  optional: true
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GRAFANA_ADMIN_PASSWORD
                  optional: true
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data-pvc
  namespace: sk-binge-galaxy
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: __STORAGE_CLASS_NAME__
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sk-binge-galaxy
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---
# Prometheus alerting rules for critical production conditions
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sk-binge-galaxy-alerts
  namespace: sk-binge-galaxy
  labels:
    release: prometheus
spec:
  groups:
    - name: gateway-errors
      rules:
        - alert: HighGateway5xxRate
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{namespace="sk-binge-galaxy", app="api-gateway", status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{namespace="sk-binge-galaxy", app="api-gateway"}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "API Gateway 5xx error rate above 5%"
            description: "{{ $value | humanizePercentage }} of gateway requests are returning 5xx errors."
    - name: pod-health
      rules:
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="sk-binge-galaxy"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "{{ $labels.pod }} in {{ $labels.namespace }} restarted {{ $value }} times in 15 min."
        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="sk-binge-galaxy", condition="true"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} not ready for 10 min"
    - name: hpa-saturation
      rules:
        - alert: HPAAtMaxReplicas
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace="sk-binge-galaxy"}
            ==
            kube_horizontalpodautoscaler_spec_max_replicas{namespace="sk-binge-galaxy"}
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "HPA {{ $labels.horizontalpodautoscaler }} at max replicas for 15 min"
            description: "Cannot scale further — consider raising maxReplicas or optimizing the service."
    - name: database-health
      rules:
        - alert: HikariPoolExhausted
          expr: |
            hikaricp_connections_active{namespace="sk-binge-galaxy"}
            >=
            hikaricp_connections_max{namespace="sk-binge-galaxy"} * 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.app }} HikariCP pool >90% utilised"
            description: "Active: {{ $value }}. Consider increasing pool size or investigating slow queries."
    - name: kafka-health
      rules:
        - alert: KafkaConsumerLag
          expr: |
            kafka_consumer_lag_sum{namespace="sk-binge-galaxy"} > 1000
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Kafka consumer group {{ $labels.group }} lag exceeds 1000"
        - alert: KafkaDltTrafficDetected
          expr: |
            sum by (topic) (
              rate(kafka_producer_record_send_total{namespace="sk-binge-galaxy", topic=~".+\\.DLT"}[10m])
            ) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Dead-letter topic {{ $labels.topic }} is receiving traffic"
            description: |
              A poison message was routed to the dead-letter topic. Every DLT
              entry is an unresolved consumer bug or data-quality issue and
              must be triaged. Inspect recent records via
              `kafka-console-consumer --topic {{ $labels.topic }}`.
        - alert: KafkaConsumerRetryStorm
          expr: |
            sum by (name) (
              rate(spring_kafka_listener_seconds_count{namespace="sk-binge-galaxy", result="failure"}[5m])
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Kafka listener {{ $labels.name }} failing >1 msg/s"
            description: "Sustained listener failures — check downstream service health; messages are being retried and may spill to DLT."
    - name: circuit-breaker
      rules:
        - alert: CircuitBreakerOpen
          expr: |
            resilience4j_circuitbreaker_state{namespace="sk-binge-galaxy", state="open"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Circuit breaker {{ $labels.name }} is OPEN on {{ $labels.app }}"
            description: "Downstream service may be unavailable. Check logs and dependencies."
    - name: payment-health
      rules:
        - alert: HighPaymentFailureRate
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{namespace="sk-binge-galaxy", app="payment-service", uri=~"/api/v1/payments/callback", status=~"4..|5.."}[10m]))
              /
              sum(rate(http_server_requests_seconds_count{namespace="sk-binge-galaxy", app="payment-service", uri=~"/api/v1/payments/callback"}[10m]))
            ) > 0.30
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Payment callback failure rate above 30%"
            description: "{{ $value | humanizePercentage }} of payment callbacks are failing."
        - alert: StaleInitiatedPayments
          expr: |
            count(payment_initiated_stale_total{namespace="sk-binge-galaxy"}) > 10
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "More than 10 stale INITIATED payments detected"
            description: "Reconciliation may be delayed or payment gateway may be unresponsive."
    - name: payment-security
      # These alerts are fed by the counters exposed in
      # PaymentMetrics.java (skbg_payment_*). Tune thresholds to your traffic —
      # the numbers below are safe starting points for production.
      rules:
        - alert: WebhookSignatureFailureSpike
          # >10 invalid-signature callbacks in 5m is almost never benign;
          # it's either a forged-webhook attack or a misconfigured secret.
          expr: |
            sum(increase(skbg_payment_signature_failures_total{namespace="sk-binge-galaxy"}[5m])) > 10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Razorpay signature failures spiking"
            description: "{{ $value }} invalid-signature callbacks in 5m. Check for a rotated secret or an attempted forgery."
        - alert: WebhookDuplicateDeliverySpike
          # Some duplicate deliveries are normal (Razorpay retries). A huge
          # spike means the provider thinks we didn't 2xx in time — investigate
          # latency on the callback endpoint.
          expr: |
            sum(rate(skbg_payment_webhook_total{namespace="sk-binge-galaxy", outcome="duplicate"}[10m])) > 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High rate of duplicate webhook deliveries"
            description: "Gateway is redelivering callbacks — check /callback latency and 5xx rate."
        - alert: IdempotencyKeyMismatchSpike
          # Mismatch = client bug reusing a key with a different body, OR
          # someone probing. Either way should be rare.
          expr: |
            sum(increase(skbg_payment_idempotency_hits_total{namespace="sk-binge-galaxy", result="mismatch"}[15m])) > 5
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Idempotency-Key payload mismatches rising"
            description: "{{ $value }} mismatches in 15m. A client is reusing keys incorrectly or someone is probing the replay protection."
        - alert: DuplicatePaymentAttemptSpike
          # Normal level: near-zero. A spike indicates client retry storm,
          # failing success page, or card testing.
          expr: |
            sum(rate(skbg_payment_duplicate_attempts_total{namespace="sk-binge-galaxy"}[5m])) > 0.5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Duplicate payment attempts rising"
            description: "{{ $value }}/s duplicate POSTs to /initiate. Likely client retry storm; check gateway 5xx and frontend spinner behaviour."
        - alert: CardTestingSuspected
          # Classic card-testing signal: burst of failures in a short window
          # from a concentrated set of users. The service-side counter is
          # incremented by PaymentReconciliationScheduler / anomaly detectors
          # when configured — left at zero today, fires only when tripped.
          expr: |
            sum(increase(skbg_card_testing_suspected_total{namespace="sk-binge-galaxy"}[5m])) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Card-testing attack pattern suspected"
            description: "The fraud heuristic fired. Check payment-service logs for the offending user/IP and block at the gateway if confirmed."
        - alert: DisputeOpened
          # A new Razorpay chargeback/dispute has been raised. Ops must submit
          # evidence to Razorpay within 48–72 h or the dispute is auto-lost.
          # Triage via GET /api/v1/payments/admin/disputes (sorted by deadline).
          expr: |
            increase(skbg_payment_dispute_total{namespace="sk-binge-galaxy", outcome="opened"}[10m]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "New Razorpay dispute opened — respond within 48h"
            description: "A chargeback has been filed. Log in to the admin panel and navigate to Payments → Disputes to see the respond-by deadline. Evidence must be submitted to Razorpay before the deadline or the dispute is automatically lost."
        - alert: DisputeDeadlineApproaching
          # Fires when disputes are still open and the respond-by window is
          # closing. Uses a 30d increase window as a proxy for open count.
          # The admin API is the authoritative source for exact deadlines.
          expr: |
            (increase(skbg_payment_dispute_total{namespace="sk-binge-galaxy", outcome="opened"}[30d])
             - increase(skbg_payment_dispute_total{namespace="sk-binge-galaxy", outcome=~"won|lost"}[30d])) > 0
          for: 2h
          labels:
            severity: warning
          annotations:
            summary: "Open disputes may be approaching response deadline"
            description: "There are unresolved disputes. Check GET /api/v1/payments/admin/disputes for deadlines. Each dispute has a 48–72h window from Razorpay."
        - alert: SagaCompensationSpike
          # Compensations should be rare. A spike means payment-booking
          # consistency is breaking — worth a human eye.
          expr: |
            sum(increase(skbg_saga_compensation_total{namespace="sk-binge-galaxy"}[30m])) > 5
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Unusual rate of saga compensations"
            description: "{{ $value }} bookings compensated in 30m — check PaymentReconciliationScheduler and booking logs."
    - name: backup-health
      rules:
        # Fire if a backup CronJob's most-recent Job failed. Relies on kube-state-metrics.
        - alert: BackupJobFailed
          expr: |
            max by (job_name, namespace) (
              kube_job_status_failed{namespace="sk-binge-galaxy", job_name=~"(postgres|mongodb)-backup-.*"}
            ) > 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Backup job {{ $labels.job_name }} failed"
            description: "The latest run of {{ $labels.job_name }} failed. Investigate the CronJob logs immediately — data loss risk grows with every missed day."
        # Fire if no successful backup Job completed in the last 26h (CronJob runs daily @ 02:00).
        - alert: NoRecentBackup
          expr: |
            (time() - max by (namespace) (
              kube_job_status_completion_time{namespace="sk-binge-galaxy", job_name=~"postgres-backup-.*"}
            )) > 26 * 3600
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "No successful postgres backup in over 26 hours"
            description: "Latest successful postgres backup completed over 26h ago. Check CronJob history, PVC space, and S3 connectivity."
        - alert: NoRecentMongoBackup
          expr: |
            (time() - max by (namespace) (
              kube_job_status_completion_time{namespace="sk-binge-galaxy", job_name=~"mongodb-backup-.*"}
            )) > 26 * 3600
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "No successful mongodb backup in over 26 hours"
            description: "Latest successful mongodb backup completed over 26h ago. Check CronJob history, PVC space, and S3 connectivity."
    # ── JVM heap creep ────────────────────────────────────────────────────────
    - name: jvm-health
      rules:
        - alert: JvmHeapHighSustained
          # Heap ratio > 80% for 30 min signals a probable leak. G1GC should
          # keep post-GC usage well below 70%; sustained pressure above 80%
          # means live objects are accumulating between major GC cycles.
          expr: |
            (
              jvm_memory_used_bytes{namespace="sk-binge-galaxy", area="heap"}
              /
              jvm_memory_max_bytes{namespace="sk-binge-galaxy", area="heap"}
            ) > 0.80
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.app }} JVM heap > 80% for 30 min — possible leak"
            description: "Heap ratio: {{ $value | humanizePercentage }}. Check for unbounded caches, ThreadLocal accumulation, or class-loader leaks. Pod will restart on OOM."
        - alert: JvmHeapCritical
          expr: |
            (
              jvm_memory_used_bytes{namespace="sk-binge-galaxy", area="heap"}
              /
              jvm_memory_max_bytes{namespace="sk-binge-galaxy", area="heap"}
            ) > 0.92
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.app }} JVM heap > 92% — OOM imminent"
            description: "Heap ratio: {{ $value | humanizePercentage }}. Restart or heap-dump immediately before the pod crashes."
    # ── Kafka consumer lag per topic ──────────────────────────────────────────
    - name: kafka-lag-per-topic
      rules:
        - alert: KafkaConsumerLagPerTopicHigh
          # Alert when any single topic accumulates > 500 unprocessed messages.
          # The existing total-lag alert (> 1000 across all topics) fires too late
          # — a single topic at 999 events is invisible to it. Per-topic alerting
          # catches a slow consumer before it becomes a multi-thousand-event debt.
          expr: |
            kafka_consumer_lag{namespace="sk-binge-galaxy"} > 500
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Kafka topic {{ $labels.topic }} lag > 500 for group {{ $labels.consumerGroup }}"
            description: "Lag: {{ $value }}. Check consumer health and downstream service latency for this topic."
        - alert: KafkaConsumerLagPerTopicCritical
          expr: |
            kafka_consumer_lag{namespace="sk-binge-galaxy"} > 5000
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Kafka topic {{ $labels.topic }} lag CRITICAL ({{ $value }}) — customers receiving stale state"
            description: "Lag > 5000 on topic {{ $labels.topic }}, group {{ $labels.consumerGroup }}. Booking-payment consistency may be broken. Check consumer pods immediately."
    # ── TLS certificate expiry ────────────────────────────────────────────────
    - name: tls-cert-expiry
      rules:
        - alert: TlsCertExpiresIn7Days
          # cert-manager exposes this metric. An ACME challenge failure silently
          # stops renewal — P1 at 7 days gives ops a weekend to recover before
          # customers hit hard HTTPS failures.
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds{namespace="sk-binge-galaxy"}
             - time()) < 7 * 24 * 3600
          for: 1h
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "TLS cert {{ $labels.name }} expires in < 7 days — P1"
            description: "Certificate {{ $labels.name }} in namespace {{ $labels.namespace }} expires at {{ $value | humanizeTimestamp }}. Check cert-manager ACME challenge status and Let's Encrypt rate limits."
        - alert: TlsCertExpiresIn3Days
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds{namespace="sk-binge-galaxy"}
             - time()) < 3 * 24 * 3600
          for: 30m
          labels:
            severity: critical
            priority: P0
          annotations:
            summary: "TLS cert {{ $labels.name }} expires in < 3 days — P0 IMMEDIATE ACTION"
            description: "Certificate {{ $labels.name }} will expire in < 3 days. All HTTPS traffic will hard-fail at expiry. Manually trigger cert-manager renewal: kubectl annotate certificate {{ $labels.name }} cert-manager.io/renew-before=72h"
    # ── Redis memory ──────────────────────────────────────────────────────────
    - name: redis-health
      rules:
        - alert: RedisMemoryHigh
          # redis_memory_used_bytes / redis_memory_max_bytes. When this ratio
          # approaches 1.0, allkeys-lru eviction begins — rate-limit keys may
          # be evicted, producing incorrect (too-permissive) rate limit results.
          expr: |
            redis_memory_used_bytes{namespace="sk-binge-galaxy"}
            /
            redis_memory_max_bytes{namespace="sk-binge-galaxy"} > 0.80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Redis memory > 80% — LRU eviction active"
            description: "Redis used {{ $value | humanizePercentage }} of maxmemory. Eviction is occurring — rate-limit buckets or session tokens may be evicted prematurely. Consider increasing maxmemory or reducing key TTLs."
        - alert: RedisDown
          expr: |
            up{namespace="sk-binge-galaxy", job="redis"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Redis is DOWN — rate limiting, session revocation, and caching broken"
            description: "Redis exporter is not responding. All distributed rate limiters, idempotency caches, and token revocation lists are unavailable."
    # ── HikariCP connection queue ─────────────────────────────────────────────
    - name: hikari-health
      rules:
        - alert: HikariPendingConnectionsNonZero
          # Pending > 0 means all pool connections are in use and new requests
          # are queuing. Any sustained non-zero pending count is early warning of
          # pool exhaustion. connection-timeout (now 5 s) limits queue duration,
          # but the pool may be undersized or queries are running too slow.
          expr: |
            hikaricp_connections_pending{namespace="sk-binge-galaxy"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.app }} HikariCP has {{ $value }} pending connection requests"
            description: "All {{ $labels.pool }} connections are in use. Either slow queries are holding connections or the pool is undersized. Check hikaricp_connections_active and slow query logs."
    # ── Mock notification provider usage ─────────────────────────────────────
    - name: mock-provider-safety
      rules:
        - alert: MockNotificationProviderActiveInProduction
          # This counter is incremented by MockSmsProvider / MockWhatsAppProvider
          # / MockPushProvider. Any non-zero value in production means a mock
          # provider registered despite @Profile("!production") — indicates a
          # misconfigured SPRING_PROFILES_ACTIVE or a unit-test bean leaking.
          expr: |
            sum(increase(notification_mock_send_total{namespace="sk-binge-galaxy"}[1h])) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Mock notification provider sending real messages as stubs — no SMS/WhatsApp/push delivered"
            description: "notification.mock.send counter is non-zero. A mock provider registered in production. Customers are NOT receiving notifications. Check SPRING_PROFILES_ACTIVE and provider config."
    # ── Postgres transaction ID wraparound (CRITICAL infrastructure risk) ────
    # pg_stat_user_tables exposes n_dead_tup. age(datfrozenxid) requires pg_stat_database.
    # With postgres_exporter configured to scrape pg_stat_database, this alert fires
    # when any DB approaches the 2-billion-XID wraparound threshold.
    # Alert at 500M transactions remaining — gives a maintenance window before Postgres
    # enters protective read-only mode at ~50M remaining.
    - name: postgres-xid-wraparound
      rules:
        - alert: PostgresXidWraparoundApproaching
          expr: |
            max by (datname) (
              pg_stat_database_xid_age{namespace="sk-binge-galaxy"}
            ) > 1500000000
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Postgres XID age {{ $value }} approaching wraparound (limit 2B) on {{ $labels.datname }}"
            description: |
              Database {{ $labels.datname }} XID age is {{ $value }}.
              Postgres will go read-only at ~2B. Run: VACUUM FREEZE on high-write tables (outbox_event, booking_event_log, processed_event, loyalty_ledger_entry).
              Also verify autovacuum is running: SELECT schemaname, relname, last_autovacuum FROM pg_stat_user_tables ORDER BY last_autovacuum NULLS FIRST;
        - alert: PostgresXidWraparoundCritical
          expr: |
            max by (datname) (
              pg_stat_database_xid_age{namespace="sk-binge-galaxy"}
            ) > 1800000000
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "CRITICAL: Postgres XID wraparound IMMINENT on {{ $labels.datname }} — forced read-only in < 200M transactions"
            description: |
              XID age {{ $value }} on {{ $labels.datname }}. Postgres will go read-only to prevent corruption.
              IMMEDIATE ACTION: Run VACUUM FREEZE on all high-write tables. Consider emergency maintenance window.
    # ── Postgres dead tuple bloat (autovacuum not keeping up) ────────────────
    - name: postgres-dead-tuples
      rules:
        - alert: PostgresHighDeadTuples
          expr: |
            max by (relname) (
              pg_stat_user_tables_n_dead_tup{namespace="sk-binge-galaxy",relname=~"outbox_event|booking_event_log|processed_event|loyalty_ledger_entry"}
            ) > 500000
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "High dead tuple count on {{ $labels.relname }}: {{ $value }}"
            description: "Table {{ $labels.relname }} has {{ $value }} dead tuples. Autovacuum may not be keeping up. Check pg_stat_user_tables.last_autovacuum."
    # ── Kafka per-partition hot-spotting ─────────────────────────────────────
    - name: kafka-partition-skew
      rules:
        - alert: KafkaPartitionLagSkew
          # Fires when one partition has > 10× the lag of other partitions on the
          # same topic+group — a sign of partition key skew (one key dominates).
          # Two idle consumers + one overloaded consumer is invisible to total-lag alerts.
          expr: |
            (
              max by (topic, consumerGroup) (kafka_consumer_lag_partition{namespace="sk-binge-galaxy"})
              /
              avg by (topic, consumerGroup) (kafka_consumer_lag_partition{namespace="sk-binge-galaxy"})
            ) > 10
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Kafka partition skew on topic {{ $labels.topic }}/{{ $labels.consumerGroup }}: one partition > 10× average"
            description: |
              Hot-spot detected. One partition is receiving most of the traffic.
              Consider using bingeId as partition key for booking topics to distribute load evenly.
              Inspect: kafka-consumer-groups.sh --describe --group {{ $labels.consumerGroup }}
---
# Alertmanager configuration for notification routing
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: sk-binge-galaxy
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    # ── Inhibit rules: suppress lower-severity alerts when a critical one fires ──
    # Prevents alert storms from training engineers to dismiss pages.
    inhibit_rules:
      # When Redis is down, inhibit the "Redis memory high" warning — it's redundant.
      - source_match:
          alertname: RedisDown
        target_match:
          alertname: RedisMemoryHigh
        equal: ['namespace']
      # When JVM is critical, inhibit the warning version
      - source_match:
          alertname: JvmHeapCritical
        target_match:
          alertname: JvmHeapHighSustained
        equal: ['namespace', 'pod']
      # When Kafka is critical, inhibit per-topic warning
      - source_match:
          alertname: KafkaConsumerLagPerTopicCritical
        target_match:
          alertname: KafkaConsumerLagPerTopicHigh
        equal: ['namespace', 'topic']
      # During Postgres XID critical, inhibit dead-tuple warning (same root cause)
      - source_match:
          alertname: PostgresXidWraparoundCritical
        target_match:
          alertname: PostgresHighDeadTuples
        equal: ['namespace']
    route:
      receiver: default-receiver
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # P0/P1 critical alerts: page on-call immediately
        - match:
            severity: critical
          receiver: critical-receiver
          repeat_interval: 1h
          group_wait: 10s
        # Warning/P3 alerts: Slack only — no PagerDuty page to prevent fatigue
        - match:
            severity: warning
          receiver: warning-receiver
          repeat_interval: 6h
    receivers:
      - name: default-receiver
        slack_configs:
          - api_url: ${SLACK_WEBHOOK_URL}
            channel: '#sk-binge-alerts'
            title: '{{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
      - name: warning-receiver
        slack_configs:
          - api_url: ${SLACK_WEBHOOK_URL}
            channel: '#sk-binge-alerts-low'
            title: '[WARNING] {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
      - name: critical-receiver
        slack_configs:
          - api_url: ${SLACK_WEBHOOK_URL}
            channel: '#sk-binge-critical'
            title: 'CRITICAL: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'
        pagerduty_configs:
          - routing_key: ${PAGERDUTY_ROUTING_KEY}
            severity: critical
            description: '{{ .GroupLabels.alertname }}: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
