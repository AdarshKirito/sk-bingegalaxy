apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sk-binge-galaxy
  annotations:
    # ⚠ PRODUCTION WARNING: This single-node StatefulSet is NOT suitable for production.
    # A node failure causes data-layer downtime for all four databases (auth, availability,
    # booking, payment). For production, use one of:
    #   1. Managed PostgreSQL (AWS RDS, GCP Cloud SQL, Azure Database) — RECOMMENDED
    #   2. CloudNativePG operator (cnpg.io) with 3-node cluster + automatic failover
    #   3. Patroni/Spilo with streaming replication
    # When using a managed service, disable this StatefulSet and use the ExternalName
    # Service at the bottom of this file instead.
    production-ready: "false"
spec:
  serviceName: postgres
  replicas: 1  # Use PgBouncer + streaming replication for HA; scale via read-replicas
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-admin-creds
          env:
            - name: POSTGRES_DB
              value: "auth_db"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "skbg_admin"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "skbg_admin"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: __STORAGE_CLASS_NAME__
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sk-binge-galaxy
spec:
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: sk-binge-galaxy
data:
  init-databases.sql: |
    SELECT 'CREATE DATABASE availability_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'availability_db')\gexec
    SELECT 'CREATE DATABASE booking_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'booking_db')\gexec
    SELECT 'CREATE DATABASE payment_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'payment_db')\gexec

    -- Per-service users (least privilege)
    DO $$ BEGIN
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'auth_svc') THEN
        CREATE ROLE auth_svc WITH LOGIN PASSWORD current_setting('app.auth_svc_pw', true);
      END IF;
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'availability_svc') THEN
        CREATE ROLE availability_svc WITH LOGIN PASSWORD current_setting('app.availability_svc_pw', true);
      END IF;
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'booking_svc') THEN
        CREATE ROLE booking_svc WITH LOGIN PASSWORD current_setting('app.booking_svc_pw', true);
      END IF;
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'payment_svc') THEN
        CREATE ROLE payment_svc WITH LOGIN PASSWORD current_setting('app.payment_svc_pw', true);
      END IF;
    END $$;

    GRANT CONNECT ON DATABASE availability_db TO availability_svc;
    GRANT CONNECT ON DATABASE booking_db TO booking_svc;
    GRANT CONNECT ON DATABASE payment_db TO payment_svc;
---
# ── Managed PostgreSQL (production) ──────────────────────────────────────────
# Uncomment the Service below and disable the StatefulSet above when switching
# to a managed PostgreSQL instance (RDS, Cloud SQL, Azure Database, etc.).
# Replace __MANAGED_PG_HOST__ with your managed DB hostname.
#
# apiVersion: v1
# kind: Service
# metadata:
#   name: postgres
#   namespace: sk-binge-galaxy
# spec:
#   type: ExternalName
#   externalName: __MANAGED_PG_HOST__
