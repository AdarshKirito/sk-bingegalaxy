# ── RBAC for Spring Cloud Kubernetes service discovery ──
# Spring Cloud Kubernetes needs permission to read Services, Endpoints, and Pods

apiVersion: v1
kind: ServiceAccount
metadata:
  name: spring-cloud-kubernetes
  namespace: sk-binge-galaxy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spring-cloud-kubernetes-role
  namespace: sk-binge-galaxy
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spring-cloud-kubernetes-binding
  namespace: sk-binge-galaxy
subjects:
  - kind: ServiceAccount
    name: spring-cloud-kubernetes
    namespace: sk-binge-galaxy
roleRef:
  kind: Role
  name: spring-cloud-kubernetes-role
  apiGroup: rbac.authorization.k8s.io
