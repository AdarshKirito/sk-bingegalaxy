# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth_sensitive:10m rate=5r/m;
limit_req_status 429;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # ── JSON responses for rate-limit and upstream errors ─────
    error_page 429 = @rate_limit_error;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # unsafe-none is required for Google Identity Services popup mode:
    # accounts.google.com sets COOP:same-origin on its popup, which conflicts
    # with same-origin-allow-popups and breaks the postMessage channel, causing
    # the GIS library to fall back to redirect-based auth and throttle navigation.
    add_header Cross-Origin-Opener-Policy "unsafe-none" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Strict-Transport-Security is set by the ingress/load balancer (TLS terminator), not nginx.
    # Setting it here over plain HTTP violates RFC 6797 §8.1 and has no effect.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://accounts.google.com; connect-src 'self' https://accounts.google.com; frame-ancestors 'self';" always;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── Never cache service worker or HTML shell ─────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # ── Static assets caching ────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Use Docker embedded DNS so nginx re-resolves on each request
    # (prevents stale IP cache when containers restart)
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;
        set $upstream_gateway http://api-gateway:8080;
        proxy_pass $upstream_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Return JSON on upstream errors instead of raw nginx HTML
        proxy_intercept_errors on;
        error_page 429 = @rate_limit_error;
        error_page 502 503 504 = @gateway_error;
    }

    location /api/v1/auth/admin/login {
        limit_req zone=login burst=3 nodelay;
        set $upstream_gateway http://api-gateway:8080;
        proxy_pass $upstream_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_intercept_errors on;
        error_page 429 = @rate_limit_error;
        error_page 502 503 504 = @gateway_error;
    }

    location /api/v1/auth/forgot-password {
        limit_req zone=auth_sensitive burst=2 nodelay;
        set $upstream_gateway http://api-gateway:8080;
        proxy_pass $upstream_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_intercept_errors on;
        error_page 429 = @rate_limit_error;
        error_page 502 503 504 = @gateway_error;
    }

    location /api/v1/auth/register {
        limit_req zone=auth_sensitive burst=2 nodelay;
        set $upstream_gateway http://api-gateway:8080;
        proxy_pass $upstream_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_intercept_errors on;
        error_page 429 = @rate_limit_error;
        error_page 502 503 504 = @gateway_error;
    }

    location /api/v1/ {
        limit_req zone=api burst=40 nodelay;
        set $upstream_gateway http://api-gateway:8080;
        proxy_pass $upstream_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;

        # ── Timeouts ─────────────────────────────────────────
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Return JSON on upstream errors instead of raw nginx HTML
        proxy_intercept_errors on;
        error_page 429 = @rate_limit_error;
        error_page 502 503 504 = @gateway_error;
    }

    # ── SSE stream for admin real-time updates ────────────
    location /api/v1/bookings/admin/events/stream {
        set $upstream_gateway http://api-gateway:8080;
        proxy_pass $upstream_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # ── JSON error page for rate limiting ─────────────────
    location @rate_limit_error {
        default_type application/json;
        return 429 '{"success":false,"message":"Too many requests. Please wait a moment and try again.","status":429}';
    }

    # ── JSON error page for upstream failures ─────────────
    location @gateway_error {
        default_type application/json;
        return 503 '{"success":false,"message":"Service is temporarily unavailable. Please try again later.","status":503}';
    }
}
